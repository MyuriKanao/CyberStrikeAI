  - name: "body_template"
    aliases: ["json_body", "request_body"]
    type: "string"
    description: "HTTP 请求体模板，支持 ^USER^、^PASS^、{username}、{password} 占位符；例如 {\"email\":\"^USER^\",\"password\":\"^PASS^\"}。"
